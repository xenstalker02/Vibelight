# Dependabot version updates — keeps the repo current with no manual attention.
# Security updates run separately (GitHub default, no config needed).
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # CI actions only — patch drift on the workflow actions (low volume, safe).
  # gitsubmodule version-updates were intentionally dropped: submodules are pinned
  # deliberately (moonlight-common-c must never auto-bump — it carries the mic
  # control-stream API), and data-submodule bumps are low-value churn in
  # maintenance mode. Security-driven updates still arrive automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

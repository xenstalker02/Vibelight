# Dependabot version updates — keeps the repo current with no manual attention.
# Security updates run separately (GitHub default, no config needed).
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Submodule pins (SDL_GameControllerDB, libs, etc.). Weekly, not daily, to keep
  # PR volume low in maintenance mode. Review moonlight-common-c bumps with care
  # (verify LiSendRawControlStreamPacket) — see MAINTENANCE.md.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # CI actions — patch drift on the workflow actions (low volume, safe to merge).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
